name: Redemption Self-Check

on:
  push:
    paths:
      - 'submission/**'
  workflow_dispatch:  # enables the "Run workflow" button in the GitHub Actions UI

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout student's repo ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Set up Python & g++ ─────────────────────────────────────────────
      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ python3 python3-pip unzip

      # ── 3. Download grader scripts from lecturer's public repo ─────────────
      #   ⚠️  LECTURER: Replace YOUR_GITHUB_USERNAME and YOUR_GRADER_REPO below
      - name: Download grader scripts
        run: |
          BASE="https://raw.githubusercontent.com/faheemezani/bitp1123-grader/master"
          curl -fsSL "$BASE/grade_redemption.py"    -o grade_redemption.py
          curl -fsSL "$BASE/grade_lab_searching.py" -o grade_lab_searching.py

      # ── 4. Detect submission type, prepare input, and run grader ──────────
      #
      #   LT1 redemption → student submits a .zip containing their .cpp files
      #                     Strategy: try extracted folder first, then raw zip path
      #   LT2 redemption → student submits LT1_skeleton.cpp directly
      #                     Pass the .cpp path directly to grader
      #
      - name: Run grader
        id: grader
        run: |
          SUBMISSION_DIR="submission"

          # ── Find submitted file (ignore the placeholder .txt) ──────────────
          ZIP_FILE=$(find "$SUBMISSION_DIR" -maxdepth 1 -type f -iname "*.zip" | head -1)
          CPP_FILE=$(find "$SUBMISSION_DIR" -maxdepth 1 -type f -iname "*.cpp" | head -1)

          if [ -z "$ZIP_FILE" ] && [ -z "$CPP_FILE" ]; then
            {
              echo "result<<GRADER_EOF"
              echo "❌ No submission file found in submission/"
              echo ""
              echo "Expected:"
              echo "  LT1 redemption → a .zip file containing your .cpp source files"
              echo "  LT2 redemption → LT1_skeleton.cpp"
              echo "GRADER_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Helper: run grader and capture output + exit code ──────────────
          # NOTE: "|| true" prevents bash -e from aborting when the grader
          # exits non-zero; we check $GRADER_EXIT ourselves afterwards.
          run_grader() {
            local target="$1"
            local flag="$2"   # "--submissions" for folders/zips, "--feedback" unused here
            GRADER_OUTPUT=$(python3 grade_redemption.py --submissions "$target" 2>&1) || true
            GRADER_EXIT=$?
          }

          # ── Route by file type ─────────────────────────────────────────────
          if [ -n "$ZIP_FILE" ]; then
            echo ">>> Detected LT1 redemption (.zip)"

            # ── Extract zip and normalise folder structure ───────────────────
            # The grader's find_submission_folders() recognises student folders
            # only when the folder name is exactly a student ID (e.g. B032510498).
            # Zip files are often named B032510498_Set4.zip, producing a folder
            # named B032510498_Set4 — the _SetX suffix breaks detection.
            # Strategy:
            #   1. Extract zip into a temp location.
            #   2. Find the deepest folder that contains .cpp files.
            #   3. Rename/move that folder to just the student ID.
            #   4. Pass the parent of that renamed folder as --submissions.

            ZIPNAME=$(basename "$ZIP_FILE" .zip)

            # Extract student ID: strip everything after the first non-ID character
            # Student IDs match [A-Z][0-9]{9,} — capture that prefix only.
            STUDENT_ID=$(echo "$ZIPNAME" | grep -oiE '^[A-Z][0-9]{9,}')
            if [ -z "$STUDENT_ID" ]; then
              STUDENT_ID="$ZIPNAME"   # fallback: use full zip name
            fi
            echo ">>> Student ID: $STUDENT_ID"

            # Extract into a temp folder
            TEMP_EXTRACT="extracted_submission/temp_${ZIPNAME}"
            mkdir -p "$TEMP_EXTRACT"
            unzip -q "$ZIP_FILE" -d "$TEMP_EXTRACT"

            echo ">>> Extracted to: $TEMP_EXTRACT"
            echo ">>> Contents: $(ls -1 "$TEMP_EXTRACT" | tr '\n' ' ')"

            # Find the folder that actually contains .cpp files (up to 3 levels deep)
            # This student's zip has two levels of nesting:
            #   TEMP_EXTRACT/B032510498_Set4/B032510498_Set4/*.cpp
            FIRST_CPP=$(find "$TEMP_EXTRACT" -maxdepth 3 -name "*.cpp" | head -1)
            echo ">>> First .cpp found: $FIRST_CPP"
            CPP_PARENT=$(dirname "$FIRST_CPP")

            if [ -z "$CPP_PARENT" ]; then
              echo ">>> WARNING: No .cpp files found after extraction."
              CPP_PARENT="$TEMP_EXTRACT"
            fi
            echo ">>> .cpp files found in: $CPP_PARENT"

            # Build the submissions root with the student ID as the folder name
            SUBMISSIONS_ROOT="extracted_submission/submissions"
            STUDENT_DIR="$SUBMISSIONS_ROOT/$STUDENT_ID"
            mkdir -p "$SUBMISSIONS_ROOT"

            # Move the cpp-containing folder to STUDENT_ID name
            cp -r "$CPP_PARENT" "$STUDENT_DIR"
            echo ">>> Prepared student folder: $STUDENT_DIR"
            echo ">>> Folder contents: $(ls -1 "$STUDENT_DIR" | tr '\n' ' ')"

            # Attempt 1: pass submissions root to grader
            echo ">>> Attempt 1: passing $SUBMISSIONS_ROOT to grader"
            run_grader "$SUBMISSIONS_ROOT"

            if [ $GRADER_EXIT -ne 0 ]; then
              echo ">>> Attempt 1 failed (exit $GRADER_EXIT). Retrying with raw zip path..."
              # Attempt 2: pass raw zip path directly
              run_grader "$ZIP_FILE"
            fi

          elif [ -n "$CPP_FILE" ]; then
            # LT2: check for ___BLANK___ tokens as a sanity signal
            if grep -q "___BLANK___" "$CPP_FILE"; then
              echo ">>> Detected LT2 redemption (.cpp with ___BLANK___ tokens)"
            else
              echo ">>> WARNING: .cpp file found but no ___BLANK___ tokens detected."
              echo ">>> Proceeding as LT2 submission; grader will report any issues."
            fi
            run_grader "$CPP_FILE"
          fi

          # ── Write result to GITHUB_OUTPUT ─────────────────────────────────
          if [ $GRADER_EXIT -ne 0 ]; then
            {
              echo "result<<GRADER_EOF"
              echo "⚠️ Grader encountered an error (exit code $GRADER_EXIT)."
              echo "Please check your submission structure and try again."
              echo ""
              echo "--- Grader output ---"
              echo "$GRADER_OUTPUT"
              echo "GRADER_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "result<<GRADER_EOF"
              echo "$GRADER_OUTPUT"
              echo "GRADER_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Post result as a commit comment (always, even on grader error) ──
      # NOTE: grader output is passed via env var (GRADER_RESULT) rather than
      # inline template literal interpolation, to avoid JS syntax errors when
      # the output contains backticks, dollar signs, or other special characters.
      - name: Post commit comment
        if: always()
        uses: actions/github-script@v7
        env:
          GRADER_RESULT: ${{ steps.grader.outputs.result }}
        with:
          script: |
            const result = process.env.GRADER_RESULT
              || '(no output captured — check the Actions log for details)';
            const body = [
              '## 🎓 BITP1123 Redemption Self-Check',
              '',
              '```',
              result,
              '```',
              '',
              '_This is an automated check. Final marks are determined by your lecturer._',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body,
            });
