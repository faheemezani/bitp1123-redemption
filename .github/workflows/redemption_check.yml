name: Redemption Self-Check

on:
  push:
    paths:
      - 'submission/**'

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout student's repo ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python & g++ ─────────────────────────────────────────────
      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ python3 python3-pip unzip

      # ── 3. Download grader scripts from lecturer's public repo ─────────────
      #   ⚠️  LECTURER: Replace YOUR_GITHUB_USERNAME and YOUR_GRADER_REPO below
      - name: Download grader scripts
        run: |
          BASE="https://raw.githubusercontent.com/faheemezani/bitp1123-grader/master"
          curl -fsSL "$BASE/grade_redemption.py"    -o grade_redemption.py
          curl -fsSL "$BASE/grade_lab_searching.py" -o grade_lab_searching.py

      # ── 4. Detect submission type and run grader ───────────────────────────
      #
      #   LT1 redemption → student submits a .zip containing their .cpp files
      #   LT2 redemption → student submits LT1_skeleton.cpp directly
      #
      - name: Run grader
        id: grader
        run: |
          SUBMISSION_DIR="submission"

          # ── Find submitted file (ignore the placeholder .txt) ──────────────
          ZIP_FILE=$(find "$SUBMISSION_DIR" -maxdepth 1 -type f -iname "*.zip" | head -1)
          CPP_FILE=$(find "$SUBMISSION_DIR" -maxdepth 1 -type f -iname "*.cpp" | head -1)

          if [ -z "$ZIP_FILE" ] && [ -z "$CPP_FILE" ]; then
            {
              echo "result<<GRADER_EOF"
              echo "❌ No submission file found in submission/"
              echo ""
              echo "Expected:"
              echo "  LT1 redemption → a .zip file containing your .cpp source files"
              echo "  LT2 redemption → LT1_skeleton.cpp"
              echo "GRADER_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Route: .zip → LT1, .cpp → LT2 ────────────────────────────────
          if [ -n "$ZIP_FILE" ]; then
            echo ">>> Detected LT1 redemption (.zip)"
            TARGET="$ZIP_FILE"

          elif [ -n "$CPP_FILE" ]; then
            # Double-check: LT2 skeleton contains ___BLANK___ tokens
            if grep -q "___BLANK___" "$CPP_FILE"; then
              echo ">>> Detected LT2 redemption (.cpp with ___BLANK___ tokens)"
            else
              echo ">>> WARNING: .cpp file found but no ___BLANK___ tokens detected."
              echo ">>> Proceeding as LT2 submission; grader will report any issues."
            fi
            TARGET="$CPP_FILE"
          fi

          # ── Run the redemption grader; capture stdout + stderr ─────────────
          OUTPUT=$(python3 grade_redemption.py "$TARGET" 2>&1)

          {
            echo "result<<GRADER_EOF"
            echo "$OUTPUT"
            echo "GRADER_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 5. Post result as a commit comment ────────────────────────────────
      - name: Post commit comment
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ steps.grader.outputs.result }}`;
            const body = [
              '## 🎓 BITP1123 Redemption Self-Check',
              '',
              '```',
              result,
              '```',
              '',
              '_This is an automated check. Final marks are determined by your lecturer._',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body,
            });
