name: Redemption Self-Check

on:
  push:
    paths:
      - 'submission/**'
  workflow_dispatch:  # enables the "Run workflow" button in the GitHub Actions UI

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout student's repo ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Set up Python & g++ ─────────────────────────────────────────────
      - name: Set up environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ python3 python3-pip unzip

      # ── 3. Download grader scripts ─────────────────────────────────────────
      #   LT1 uses grade_redemption.py + grade_lab_searching.py
      #   LT2 uses grade_LT1_tolerant.py (standalone, no dependency)
      - name: Download grader scripts
        run: |
          BASE="https://raw.githubusercontent.com/faheemezani/bitp1123-grader/master"
          curl -fsSL "$BASE/grade_redemption.py"      -o grade_redemption.py
          curl -fsSL "$BASE/grade_lab_searching.py"   -o grade_lab_searching.py
          curl -fsSL "$BASE/grade_LT1_tolerant.py"    -o grade_LT1_tolerant.py

      # ── 4. Detect submission type and run grader ───────────────────────────
      #
      #   LT1 redemption → .zip of cpp files → grade_redemption.py --submissions <dir>
      #   LT2 redemption → single LT1_skeleton.cpp → grade_LT1_tolerant.py <file>
      #                     (cap 6.5/7.5 applied in this step)
      #
      - name: Run grader
        id: grader
        run: |
          SUBMISSION_DIR="submission"
          CAP=6.5
          MAX=7.5

          # ── Find submitted file (ignore the placeholder .txt) ──────────────
          ZIP_FILE=$(find "$SUBMISSION_DIR" -maxdepth 1 -type f -iname "*.zip" | head -1)
          CPP_FILE=$(find "$SUBMISSION_DIR" -maxdepth 1 -type f -iname "*.cpp" | head -1)

          if [ -z "$ZIP_FILE" ] && [ -z "$CPP_FILE" ]; then
            {
              echo "result<<GRADER_EOF"
              echo "❌ No submission file found in submission/"
              echo ""
              echo "Expected:"
              echo "  LT1 redemption → a .zip file containing your .cpp source files"
              echo "  LT2 redemption → your completed LT1_skeleton.cpp file"
              echo "GRADER_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ══════════════════════════════════════════════════════════════════
          #  LT1 BRANCH — zip → grade_redemption.py --submissions <dir>
          # ══════════════════════════════════════════════════════════════════
          if [ -n "$ZIP_FILE" ]; then
            echo ">>> Detected LT1 redemption (.zip)"

            ZIPNAME=$(basename "$ZIP_FILE" .zip)

            # Extract student ID: strip _SetX or any suffix after the ID pattern
            STUDENT_ID=$(echo "$ZIPNAME" | grep -oiE '^[A-Z][0-9]{9,}')
            if [ -z "$STUDENT_ID" ]; then
              STUDENT_ID="$ZIPNAME"
            fi
            echo ">>> Student ID: $STUDENT_ID"

            # Extract zip to a temp folder
            TEMP_EXTRACT="$GITHUB_WORKSPACE/extracted_submission/temp_${ZIPNAME}"
            mkdir -p "$TEMP_EXTRACT"
            unzip -q "$ZIP_FILE" -d "$TEMP_EXTRACT"
            echo ">>> Extracted to: $TEMP_EXTRACT"
            echo ">>> Top-level contents: $(ls -1 "$TEMP_EXTRACT" | tr '\n' ' ')"

            # Find the folder containing .cpp files (handles up to 3 levels of nesting)
            FIRST_CPP=$(find "$TEMP_EXTRACT" -maxdepth 3 -name "*.cpp" | head -1)
            echo ">>> First .cpp found: $FIRST_CPP"
            CPP_PARENT=$(dirname "$FIRST_CPP")
            echo ">>> .cpp parent folder: $CPP_PARENT"

            # Place the cpp-containing folder under the clean student ID name
            # grade_redemption.py requires folder name = student ID exactly
            SUBMISSIONS_ROOT="$GITHUB_WORKSPACE/extracted_submission/submissions"
            STUDENT_DIR="$SUBMISSIONS_ROOT/$STUDENT_ID"
            mkdir -p "$SUBMISSIONS_ROOT"
            cp -r "$CPP_PARENT/." "$STUDENT_DIR"
            echo ">>> Prepared: $STUDENT_DIR"
            echo ">>> Contents: $(ls -1 "$STUDENT_DIR" | tr '\n' ' ')"

            # Run LT1 grader — capture output without letting bash -e abort on failure
            GRADER_OUTPUT=$(python3 grade_redemption.py --submissions "$SUBMISSIONS_ROOT" 2>&1) || true
            GRADER_EXIT=$?

            if [ $GRADER_EXIT -ne 0 ]; then
              {
                echo "result<<GRADER_EOF"
                echo "⚠️ LT1 grader encountered an error (exit code $GRADER_EXIT)."
                echo "Please check your zip structure and try again."
                echo ""
                echo "--- Grader output ---"
                echo "$GRADER_OUTPUT"
                echo "GRADER_EOF"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "result<<GRADER_EOF"
                echo "$GRADER_OUTPUT"
                echo "GRADER_EOF"
              } >> "$GITHUB_OUTPUT"
            fi

          # ══════════════════════════════════════════════════════════════════
          #  LT2 BRANCH — LT1_skeleton.cpp → grade_LT1_tolerant.py <file>
          #  Marks are out of 100; scaled to /7.5 then capped at 6.5/7.5
          # ══════════════════════════════════════════════════════════════════
          elif [ -n "$CPP_FILE" ]; then
            echo ">>> Detected LT2 redemption (.cpp)"

            # Sanity: count remaining unfilled blanks in code sections
            BLANK_COUNT=$(grep -o "___BLANK___" "$CPP_FILE" | wc -l)
            if [ "$BLANK_COUNT" -gt 0 ]; then
              echo ">>> NOTE: $BLANK_COUNT unfilled ___BLANK___ token(s) remain. Tolerant grader will patch them."
            else
              echo ">>> All blanks appear filled — good."
            fi

            # Run the tolerant LT1 grader directly on the single .cpp file
            # Positional argument only — no --submissions flag
            GRADER_OUTPUT=$(python3 grade_LT1_tolerant.py "$CPP_FILE" 2>&1) || true
            GRADER_EXIT=$?

            if [ $GRADER_EXIT -ne 0 ]; then
              {
                echo "result<<GRADER_EOF"
                echo "⚠️ LT2 grader encountered an error (exit code $GRADER_EXIT)."
                echo ""
                echo "--- Grader output ---"
                echo "$GRADER_OUTPUT"
                echo "GRADER_EOF"
              } >> "$GITHUB_OUTPUT"
            else
              # Parse the TOTAL line: "  TOTAL                    :  XX/100  [grade]"
              RAW=$(echo "$GRADER_OUTPUT" | grep -oP 'TOTAL\s*:\s*\K[0-9]+(?=/100)' | head -1)

              if [ -z "$RAW" ]; then
                {
                  echo "result<<GRADER_EOF"
                  echo "⚠️ Could not parse total mark from grader output."
                  echo ""
                  echo "$GRADER_OUTPUT"
                  echo "GRADER_EOF"
                } >> "$GITHUB_OUTPUT"
              else
                # Scale: raw/100 × 7.5, cap at 6.5
                SCALED=$(python3 -c "
raw=$RAW
scaled = round(raw / 100 * 7.5, 2)
capped = min(scaled, 6.5)
cap_label = 'Capped at redemption limit' if scaled > 6.5 else 'Within cap'
print(f'Raw score  : {raw}/100')
print(f'Scaled     : {scaled:.2f}/7.5')
print(f'Redeemed   : {capped:.2f}/7.5  ({cap_label})')
")
                {
                  echo "result<<GRADER_EOF"
                  echo "============================================================"
                  echo "REDEMPTION GRADING [LT2]"
                  echo "Cap : 6.5/7.5"
                  echo "============================================================"
                  echo ""
                  echo "$SCALED"
                  echo ""
                  echo "------------------------------------------------------------"
                  echo "DETAIL:"
                  echo "$GRADER_OUTPUT"
                  echo "GRADER_EOF"
                } >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      # ── 5. Post result as a commit comment (always, even on grader error) ──
      # Grader output is passed via env var to avoid JS syntax errors from
      # special characters (backticks, $, etc.) in the output.
      - name: Post commit comment
        if: always()
        uses: actions/github-script@v7
        env:
          GRADER_RESULT: ${{ steps.grader.outputs.result }}
        with:
          script: |
            const result = process.env.GRADER_RESULT
              || '(no output captured — check the Actions log for details)';
            const body = [
              '## 🎓 BITP1123 Redemption Self-Check',
              '',
              '```',
              result,
              '```',
              '',
              '_This is an automated check. Final marks are determined by your lecturer._',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body,
            });
